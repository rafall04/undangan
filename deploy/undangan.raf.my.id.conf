# ============================================================================
# nginx vhost KHUSUS untuk undangan.raf.my.id — TIDAK menyentuh project lain.
# Taruh di /etc/nginx/sites-available/ lalu symlink ke sites-enabled/
# (atau langsung di /etc/nginx/conf.d/undangan.raf.my.id.conf).
# Proxy ke aplikasi di 127.0.0.1:3007 (samakan dengan port PM2/Docker).
# Blok TLS di bawah akan DIISI OTOMATIS oleh certbot --nginx.
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name undangan.raf.my.id;

    # Batas ukuran upload foto (untuk /studio & aset)
    client_max_body_size 25m;

    # Cache aset statis Next
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
